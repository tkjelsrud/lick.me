<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lick.me — Daily Guitar Lick Trainer</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <main class="app">
      <h1>lick.me</h1>
      <p class="subtitle">Daily guitar lick trainer</p>

      <section class="card" aria-live="polite">
        <p id="date" class="meta"></p>
        <h2 id="title">Loading today’s lick…</h2>
        <p id="info" class="meta"></p>
        <pre id="tab" class="tab"></pre>
        <p id="error" class="error" hidden></p>
      </section>
    </main>

    <script src="assets/app.js" defer></script>
  </body>
</html>
